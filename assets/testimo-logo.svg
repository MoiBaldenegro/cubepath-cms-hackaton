<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: A stylized speech bubble forming a T or Check -->
  <g transform="translate(20, 25)">
     <path d="M20 20 H80 V60 H50 L30 80 V60 H20 Z" fill="url(#grad1)" stroke="#333" stroke-width="4" stroke-linejoin="round"/>
     <text x="35" y="52" font-family="Arial, sans-serif" font-weight="bold" font-size="30" fill="white">T</text>
  </g>

  <!-- Text: Testimo -->
  <text x="120" y="90" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="80" fill="#333">
    Testimo
  </text>
  
  <!-- Tagline optional -->
  <text x="125" y="115" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#666" letter-spacing="2">
    TRUST & GROW
  </text>
</svg>