<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <linearGradient id="notif_grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#2563eb"/> 
    </linearGradient>
    <mask id="cutout-mask">
      <rect width="100%" height="100%" fill="white"/>
      <circle cx="416" cy="112" r="80" fill="black"/>
    </mask>
  </defs>

  <!-- Background: "Bubble" Outline Merge -->
  <!-- Constructed by merging expanded shapes (Padding 32px) -->
  <g id="logo-background">
     <!-- Top Bar Bubble -->
     <rect x="64" y="80" width="384" height="160" rx="80" fill="#18181B"/>
     <!-- Stem Bubble -->
     <rect x="176" y="208" width="160" height="256" rx="80" fill="#18181B"/>
     <!-- Notification Bubble -->
     <circle cx="416" cy="112" r="80" fill="#18181B"/>
  </g>
  
  <g filter="url(#shadow)">
    <!-- Top Bar -->
    <rect x="96" y="112" width="320" height="96" rx="48" fill="white" mask="url(#cutout-mask)"/>
    
    <!-- Vertical Stem -->
    <rect x="208" y="240" width="96" height="192" rx="48" fill="white"/>
    
    <!-- Notification Circle -->
    <circle cx="416" cy="112" r="48" fill="url(#notif_grad)"/>
    
  </g>
</svg>