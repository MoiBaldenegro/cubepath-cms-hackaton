<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cyber_gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/> <!-- Cyan -->
      <stop offset="0.5" stop-color="#3b82f6"/> <!-- Blue -->
      <stop offset="1" stop-color="#a855f7"/> <!-- Purple -->
    </linearGradient>
    <filter id="soft_glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: Deep Space / Modern UI Dark -->
  <rect width="512" height="512" rx="128" fill="#0f172a"/>
  
  <!-- Main Symbol: Abstract "T" formed by dynamic data blocks -->
  <g filter="url(#soft_glow)">
    <!-- Top Bar: Left Segment -->
    <path d="M120 144 H 240 L 220 208 H 120 C 106.745 208 96 197.255 96 184 V 168 C 96 154.745 106.745 144 120 144 Z" fill="url(#cyber_gradient)"/>
    
    <!-- Top Bar: Right Segment (Slightly offset for "frontier" feel) -->
    <path d="M256 144 H 392 C 405.255 144 416 154.745 416 168 V 184 C 416 197.255 405.255 208 392 208 H 272 L 256 144 Z" fill="url(#cyber_gradient)" fill-opacity="0.9"/>

    <!-- Vertical Stem: Central Pillar -->
    <path d="M224 224 H 288 V 360 C 288 386.51 266.51 408 240 408 H 272 C 245.49 408 224 386.51 224 360 V 224 Z" fill="url(#cyber_gradient)"/>
     <!-- Let's fix the stem path, it looks weird with 224 H 272. Let's make it a simple rectangle with rounded bottom -->
     <path d="M224 224 H 288 V 352 C 288 378.51 266.51 400 240 400 H 272 C 245.49 400 224 378.51 224 352 V 224 Z" fill="none"/> <!-- Removing broken path -->
     <path d="M224 224 H 288 V 352 C 288 378.51 266.51 400 240 400 V 400 C 213.49 400 192 378.51 192 352 V 224 H 224 Z" transform="translate(32, 0)" fill="url(#cyber_gradient)"/>

    <!-- Floating Data Particle / Notification Dot -->
    <circle cx="360" cy="120" r="24" fill="#e879f9" stroke="#0f172a" stroke-width="6"/>
  </g>
</svg>